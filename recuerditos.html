<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recuerditos – Flores Amarillas</title>
    <style>
      :root {
        --bg1: #fff1c8;
        --bg2: #ffd29a;
        --bg3: #ffb6c8;
        --ink: #3b2a2a;
        --card: rgba(255, 255, 255, 0.78);
        --cardStroke: rgba(255, 255, 255, 0.55);
        --shadow: rgba(80, 45, 0, 0.18);
        --yellow1: #ffe56b;
        --yellow2: #ffbf2f;
        --yellow3: #f59f00;
        --center1: #7a3b0d;
        --center2: #3b1d06;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-rounded,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans";
        color: var(--ink);
        background:
          radial-gradient(1200px 800px at 18% 18%, rgba(255, 255, 255, 0.55), transparent 60%),
          radial-gradient(900px 700px at 78% 22%, rgba(255, 220, 180, 0.7), transparent 55%),
          radial-gradient(900px 700px at 65% 85%, rgba(255, 180, 210, 0.55), transparent 58%),
          linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
        overflow-x: hidden;
        overflow-y: auto;
      }

      #pageTransition {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.65), transparent 55%),
          radial-gradient(circle at 80% 30%, rgba(255, 220, 190, 0.7), transparent 55%),
          rgba(255, 209, 150, 0.85);
        opacity: 0;
        pointer-events: none;
        transition: opacity 600ms ease;
        z-index: 999;
        overflow: hidden;
      }

      #pageTransition::before,
      #pageTransition::after {
        content: "";
        position: absolute;
        inset: -10%;
        background:
          radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.8) 0 18%, transparent 22%) 5% 20%/120px 120px repeat,
          radial-gradient(circle at 65% 25%, rgba(255, 238, 170, 0.85) 0 14%, transparent 18%) 60% 40%/140px 140px repeat,
          radial-gradient(circle at 35% 70%, rgba(255, 220, 140, 0.8) 0 16%, transparent 20%) 20% 80%/110px 110px repeat;
        opacity: 0.5;
        animation: transitionPetals 4s linear infinite;
      }

      #pageTransition::after {
        opacity: 0.35;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7) 0 14%, transparent 18%) 15% 15%/100px 100px repeat,
          radial-gradient(circle at 80% 70%, rgba(255, 220, 150, 0.8) 0 12%, transparent 16%) 70% 70%/150px 150px repeat;
        animation-duration: 5.5s;
      }

      body.is-transitioning #pageTransition {
        opacity: 1;
        pointer-events: auto;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        padding: clamp(1.2rem, 3vw, 2.5rem);
      }

      .controls {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      a.chip {
        text-decoration: none;
      }

      .chip {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.34);
        color: rgba(59, 42, 42, 0.9);
        padding: 0.55rem 0.75rem;
        border-radius: 999px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow:
          0 12px 45px rgba(0, 0, 0, 0.06),
          0 0 0.85rem rgba(255, 200, 60, 0.18),
          0 1px 0 rgba(255, 255, 255, 0.35) inset;
        transition:
          transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
          background 320ms cubic-bezier(0.42, 0, 0.58, 1),
          border-color 320ms cubic-bezier(0.42, 0, 0.58, 1),
          box-shadow 420ms cubic-bezier(0.42, 0, 0.58, 1);
      }

      .chip::after {
        content: "";
        position: absolute;
        inset: -40% -60%;
        background: linear-gradient(
          120deg,
          transparent 35%,
          rgba(255, 220, 110, 0.42) 45%,
          rgba(255, 255, 255, 0.35) 50%,
          rgba(255, 220, 110, 0.42) 55%,
          transparent 65%
        );
        transform: translateX(-60%) rotate(8deg);
        opacity: 0.55;
        pointer-events: none;
        animation: chipShine 3.8s ease-in-out infinite;
      }

      .chip:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.45);
        border-color: rgba(255, 255, 255, 0.7);
        box-shadow:
          0 18px 55px rgba(0, 0, 0, 0.07),
          0 0 1.25rem rgba(255, 200, 60, 0.26),
          0 1px 0 rgba(255, 255, 255, 0.4) inset;
      }

      .hero {
        margin: clamp(0.5rem, 3vw, 2rem) auto;
        max-width: 680px;
        text-align: center;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4.8vw, 2.2rem);
        text-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
      }

      .hero p {
        margin: 0.75rem auto 0;
        max-width: 520px;
        font-size: clamp(1rem, 3.4vw, 1.2rem);
        color: rgba(59, 42, 42, 0.78);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: clamp(1rem, 3vw, 1.8rem);
        margin: clamp(1rem, 3.5vw, 2.2rem) auto;
        max-width: 1100px;
        justify-items: center;
      }


      .polaroid {
        position: relative;
        width: min(240px, 80vw);
        padding: 0.75rem;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 245, 230, 0.92));
        box-shadow:
          0 35px 80px rgba(80, 45, 0, 0.18),
          0 4px 0 rgba(255, 255, 255, 0.6) inset;
        transform: rotate(var(--tilt, 0deg));
        animation: floatyCard var(--floatDur, 10s) ease-in-out infinite;
      }

      .polaroid img {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      }

      .polaroid figcaption {
        margin-top: 0.55rem;
        text-align: center;
        font-weight: 600;
        font-size: 0.98rem;
        color: rgba(59, 42, 42, 0.85);
      }

      .polaroidNote {
        position: absolute;
        left: 50%;
        bottom: 0.95rem;
        transform: translate(-50%, 24px);
        padding: 0.25rem 0.85rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.9);
        font-size: 0.82rem;
        font-weight: 600;
        color: rgba(59, 42, 42, 0.85);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 460ms cubic-bezier(0.33, 1, 0.68, 1),
          transform 460ms cubic-bezier(0.33, 1, 0.68, 1);
      }

      .polaroid:hover .polaroidNote,
      .polaroid:focus-within .polaroidNote {
        opacity: 1;
        transform: translate(-50%, 4px);
      }

      .backgroundGarden {
        position: absolute;
        inset: -10% -5%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.85;
      }

      .backgroundFlowerWrap {
        position: absolute;
        left: calc(var(--x) * 1vw);
        top: calc(var(--y) * 1vh);
        transform: translate3d(-50%, -50%, 0);
        animation: bgFloat var(--floatDur, 28s) cubic-bezier(0.42, 0, 0.58, 1) infinite;
        opacity: 0.4;
        filter: blur(0.2px);
      }

      .backgroundFlower {
        width: var(--size, 70px);
        height: var(--size, 70px);
        position: relative;
        transform: rotate(var(--tilt, 0deg));
      }

      .backgroundFlower .head {
        width: 100%;
        height: 100%;
        opacity: 0.85;
      }

      .backgroundFlower .petal {
        opacity: 0.7;
        filter: blur(0.25px);
      }

      .backgroundFlower .center {
        opacity: 0.85;
      }

      .backgroundFlower .spark {
        opacity: 0.35;
      }

      @keyframes chipShine {
        0%,
        58% {
          transform: translateX(-65%) rotate(8deg);
          opacity: 0.18;
        }
        70% {
          opacity: 0.58;
        }
        100% {
          transform: translateX(65%) rotate(8deg);
          opacity: 0.18;
        }
      }

      @keyframes floatyCard {
        0%,
        100% {
          transform: translateY(0) rotate(var(--tilt, 0deg));
        }
        50% {
          transform: translateY(-8px) rotate(calc(var(--tilt, 0deg) + 1deg));
        }
      }

      @keyframes bgFloat {
        0% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX, 0) * 0.12px), calc(var(--driftY, 0) * 0.14px), 0);
        }
        50% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX, 0) * 0.66px), calc(var(--driftY, 0) * 0.52px), 0);
        }
        100% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX, 0) * 0.12px), calc(var(--driftY, 0) * 0.14px), 0);
        }
      }

      @keyframes transitionPetals {
        0% {
          transform: translateY(40px) scale(1);
        }
        50% {
          transform: translateY(-20px) scale(1.05);
        }
        100% {
          transform: translateY(-80px) scale(1.08);
        }
      }

      @media (max-width: 620px) {
        .scene {
          padding-bottom: 8rem;
        }
        .gallery {
          grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="backgroundGarden" id="bgGarden" aria-hidden="true"></div>

      <div class="controls">
        <a class="chip" id="backToFlowers" href="index.html">← Volver a las flores</a>
      </div>

      <header class="hero">
        <h1>Recuerditos 🌻</h1>
        <p>Todos esos recuerditos y más me hacen muy feliz.</p>
      </header>

      <section class="gallery" aria-label="Galería de polaroids">
        <figure class="polaroid" style="--tilt: -2.5deg; --floatDur: 12s;">
          <img src="./fotos/juntitos.jpeg" alt="Foto juntos con flores amarillas" loading="lazy" />
          <span class="polaroidNote">4 de marzo</span>
          <figcaption>fotitos juntitos</figcaption>
        </figure>
        <figure class="polaroid" style="--tilt: 3deg; --floatDur: 11s;">
          <img src="./fotos/foto2.jpeg" alt="Sonrisa hermosa con flores" loading="lazy" />
          <span class="polaroidNote">7 de marzo</span>
          <figcaption>mira que hermosa eres</figcaption>
        </figure>
        <figure class="polaroid" style="--tilt: -0.5deg; --floatDur: 13s;">
          <img src="./fotos/foto1.jpeg" alt="Regalitos amarillos y amor" loading="lazy" />
          <span class="polaroidNote">16 de febrero</span>
          <figcaption>eres tan hermosa como tus regalitos</figcaption>
        </figure>
      </section>

    </div>

    <div id="pageTransition" aria-hidden="true"></div>
    <script src="recuerditos.js"></script>
    <script>
      (() => {
        const backLink = document.querySelector("#backToFlowers");
        const pageTransition = document.querySelector("#pageTransition");

        if (backLink && pageTransition) {
          backLink.addEventListener("click", (event) => {
            event.preventDefault();
            document.body.classList.add("is-transitioning");
            pageTransition.setAttribute("aria-hidden", "false");
            const target = backLink.getAttribute("href") ?? "index.html";
            setTimeout(() => (window.location.href = target), 620);
          });
        }
      })();
    </script>
  </body>
</html>
