<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flores Amarillas</title>
    <style>
      :root {
        --bg1: #fff1c8;
        --bg2: #ffd29a;
        --bg3: #ffb6c8;
        --ink: #3b2a2a;
        --card: rgba(255, 255, 255, 0.78);
        --cardStroke: rgba(255, 255, 255, 0.55);
        --shadow: rgba(80, 45, 0, 0.18);
        --yellow1: #ffe56b;
        --yellow2: #ffbf2f;
        --yellow3: #f59f00;
        --center1: #7a3b0d;
        --center2: #3b1d06;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        font-family:
          ui-rounded,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--ink);
        overflow: hidden;
      }

      body {
        background:
          radial-gradient(1200px 800px at 18% 18%, rgba(255, 255, 255, 0.55), transparent 60%),
          radial-gradient(900px 700px at 78% 22%, rgba(255, 220, 180, 0.7), transparent 55%),
          radial-gradient(900px 700px at 65% 85%, rgba(255, 180, 210, 0.55), transparent 58%),
          linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
      }

      .scene {
        position: relative;
        height: 100%;
        width: 100%;
      }

      .bokeh {
        position: absolute;
        inset: -20vmax;
        pointer-events: none;
        opacity: 0.7;
        filter: blur(0.2px);
      }
      .bokeh::before,
      .bokeh::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.35) 0 9%, transparent 10%),
          radial-gradient(circle at 30% 55%, rgba(255, 255, 255, 0.25) 0 10%, transparent 11%),
          radial-gradient(circle at 70% 35%, rgba(255, 255, 255, 0.25) 0 8%, transparent 9%),
          radial-gradient(circle at 85% 65%, rgba(255, 255, 255, 0.22) 0 10%, transparent 11%),
          radial-gradient(circle at 45% 15%, rgba(255, 255, 255, 0.18) 0 7%, transparent 8%),
          radial-gradient(circle at 58% 75%, rgba(255, 255, 255, 0.18) 0 8%, transparent 9%);
        transform: rotate(8deg);
      }
      .bokeh::after {
        opacity: 0.55;
        transform: rotate(-10deg) scale(1.05);
      }

      #garden {
        position: absolute;
        inset: 0;
      }

      #backgroundGarden {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        opacity: 0.9;
      }

      .backgroundFlowerWrap {
        position: absolute;
        left: calc(var(--x) * 1vw);
        top: calc(var(--y) * 1vh);
        transform: translate3d(-50%, -50%, 0);
        animation: bgFloat var(--floatDur, 26s) cubic-bezier(0.42, 0, 0.58, 1) infinite;
        opacity: 0.45;
        filter: blur(0.2px);
        will-change: transform, opacity;
      }

      .backgroundFlower {
        width: var(--size, 64px);
        height: var(--size, 64px);
        position: relative;
        display: grid;
        place-items: center;
        opacity: 0.8;
        transform: rotate(var(--tilt, 0deg));
      }

      .backgroundFlower .head {
        width: 100%;
        height: 100%;
        opacity: 0.85;
        filter: saturate(0.92);
      }

      .backgroundFlower .petal {
        filter: blur(0.25px);
        opacity: 0.75;
      }

      .backgroundFlower .center {
        filter: brightness(0.9);
        opacity: 0.85;
      }

      .backgroundFlower .spark {
        opacity: 0.35;
      }

      #petalRain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 25;
        opacity: 0;
        transition: opacity 1200ms cubic-bezier(0.42, 0, 0.58, 1);
      }

      #petalRain.is-active {
        opacity: 1;
      }

      .petalRain__petal {
        position: absolute;
        top: -12%;
        width: var(--petalSize, 20px);
        height: calc(var(--petalSize, 20px) * 1.35);
        border-radius: 45% 55% 45% 55%;
        background: radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.72), transparent 60%),
          linear-gradient(135deg, rgba(255, 225, 180, 0.85), rgba(255, 190, 220, 0.65));
        box-shadow: 0 6px 20px rgba(255, 195, 210, 0.35);
        filter: blur(0.2px);
        opacity: 0.75;
        transform: translate3d(0, 0, 0) rotate(var(--startTilt, -12deg));
        animation: petalFall var(--petalDur, 10s) cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
      }

      #pageTransition {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.65), transparent 55%),
          radial-gradient(circle at 80% 30%, rgba(255, 220, 190, 0.7), transparent 55%),
          rgba(255, 209, 150, 0.85);
        opacity: 0;
        pointer-events: none;
        transition: opacity 600ms ease;
        z-index: 999;
        overflow: hidden;
      }

      #pageTransition::before,
      #pageTransition::after {
        content: "";
        position: absolute;
        inset: -10%;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.8) 0 18%, transparent 22%) 5% 20%/120px 120px repeat,
          radial-gradient(circle at 70% 20%, rgba(255, 238, 170, 0.85) 0 14%, transparent 18%) 60% 40%/140px 140px repeat,
          radial-gradient(circle at 40% 70%, rgba(255, 220, 140, 0.8) 0 16%, transparent 20%) 20% 80%/110px 110px repeat;
        opacity: 0.5;
        animation: transitionPetals 4s linear infinite;
      }

      #pageTransition::after {
        opacity: 0.35;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7) 0 14%, transparent 18%) 15% 15%/100px 100px repeat,
          radial-gradient(circle at 80% 70%, rgba(255, 220, 150, 0.8) 0 12%, transparent 16%) 70% 70%/150px 150px repeat;
        animation-duration: 5.5s;
      }

      body.is-transitioning #pageTransition {
        opacity: 1;
        pointer-events: auto;
      }

      .hint {
        position: absolute;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        left: 50%;
        top: 50%;
        transform: translate(-50%, calc(-50% + 9.5rem));
        text-align: center;
        font-weight: 650;
        letter-spacing: 0.2px;
        color: rgba(59, 42, 42, 0.78);
        text-shadow: 0 10px 40px rgba(255, 255, 255, 0.55);
        padding: 0.6rem 0.9rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        pointer-events: auto;
        cursor: pointer;
        opacity: 1;
        z-index: 60;
        transition:
          opacity 520ms ease,
          transform 420ms cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 520ms cubic-bezier(0.42, 0, 0.58, 1),
          border-color 420ms cubic-bezier(0.42, 0, 0.58, 1),
          background 420ms cubic-bezier(0.42, 0, 0.58, 1);
        overflow: hidden;
      }

      .hint::after {
        content: "";
        position: absolute;
        inset: -30% -60%;
        background: linear-gradient(
          120deg,
          transparent 35%,
          rgba(255, 220, 110, 0.42) 45%,
          rgba(255, 255, 255, 0.35) 50%,
          rgba(255, 220, 110, 0.42) 55%,
          transparent 65%
        );
        transform: translateX(-65%) rotate(6deg);
        opacity: 0.4;
        pointer-events: none;
        animation: chipShine 5.5s ease-in-out infinite;
      }

      body.is-revealing .hint {
        opacity: 0;
        pointer-events: none;
      }

      .hint:hover {
        transform: translate(-50%, calc(-50% + 8.85rem));
        border-color: rgba(255, 255, 255, 0.68);
        background: rgba(255, 255, 255, 0.32);
        box-shadow:
          0 18px 55px rgba(0, 0, 0, 0.07),
          0 0 1.2rem rgba(255, 210, 90, 0.28);
      }

      .hint:active {
        transform: translate(-50%, calc(-50% + 9.15rem));
      }

      .controls {
        position: absolute;
        left: 1rem;
        top: 1rem;
        display: flex;
        gap: 0.6rem;
        z-index: 40;
      }

      .chip {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.34);
        color: rgba(59, 42, 42, 0.9);
        padding: 0.55rem 0.75rem;
        border-radius: 999px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow:
          0 12px 45px rgba(0, 0, 0, 0.06),
          0 0 0.85rem rgba(255, 200, 60, 0.18),
          0 1px 0 rgba(255, 255, 255, 0.35) inset;
        transition:
          transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
          background 320ms cubic-bezier(0.42, 0, 0.58, 1),
          border-color 320ms cubic-bezier(0.42, 0, 0.58, 1),
          box-shadow 420ms cubic-bezier(0.42, 0, 0.58, 1),
          filter 320ms cubic-bezier(0.42, 0, 0.58, 1);
        text-decoration: none;
      }

      .chip--timer {
        min-width: 9.5rem;
        text-align: left;
        letter-spacing: 0.15px;
        font-weight: 650;
      }

      .chip::after {
        content: "";
        position: absolute;
        inset: -40% -60%;
        background: linear-gradient(
          120deg,
          transparent 35%,
          rgba(255, 220, 110, 0.42) 45%,
          rgba(255, 255, 255, 0.35) 50%,
          rgba(255, 220, 110, 0.42) 55%,
          transparent 65%
        );
        transform: translateX(-60%) rotate(8deg);
        opacity: 0.55;
        pointer-events: none;
        animation: chipShine 3.8s ease-in-out infinite;
      }

      .chip:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.45);
        border-color: rgba(255, 255, 255, 0.7);
        box-shadow:
          0 18px 55px rgba(0, 0, 0, 0.07),
          0 0 1.25rem rgba(255, 200, 60, 0.26),
          0 1px 0 rgba(255, 255, 255, 0.4) inset;
      }
      .chip:active {
        transform: translateY(0);
      }

      .flowerWrap {
        position: absolute;
        left: calc(var(--x) * 1vw);
        top: calc(var(--y) * 1vh);
        transform: translate3d(-50%, -50%, 0);
        will-change: transform, opacity;
        animation:
          floaty var(--floatDur) cubic-bezier(0.42, 0, 0.58, 1) infinite,
          appear 950ms cubic-bezier(0.33, 0, 0.67, 1) both;
        animation-delay: var(--delay), 0ms;
        z-index: 10;
      }

      .flowerWrap.is-main {
        z-index: 20;
      }

      .flower {
        --size: 86px;
        width: var(--size);
        height: var(--size);
        display: grid;
        place-items: center;
        border: none;
        background: transparent;
        padding: 0;
        cursor: pointer;
        position: relative;
        filter:
          drop-shadow(0 20px 40px rgba(130, 75, 0, 0.18))
          drop-shadow(0 0 16px rgba(255, 210, 64, 0.18));
        transform-origin: center;
        will-change: transform, filter, opacity;
        animation: sway var(--swayDur) cubic-bezier(0.42, 0, 0.58, 1) infinite;
        transition: filter 420ms cubic-bezier(0.42, 0, 0.58, 1);
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      .flower.is-reacting {
        filter:
          drop-shadow(0 28px 55px rgba(130, 75, 0, 0.26))
          drop-shadow(0 0 1.25rem rgba(255, 236, 183, 0.8));
      }

      .flowerReaction {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 150%;
        height: 150%;
        transform: translate(-50%, -50%) scale(0.25);
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 245, 210, 0.85), transparent 72%);
        mix-blend-mode: screen;
        pointer-events: none;
        animation: reactionPulse 1.4s cubic-bezier(0.33, 0, 0.67, 1) forwards;
        opacity: 0.8;
      }

      .flower:focus-visible {
        filter:
          drop-shadow(0 25px 45px rgba(130, 75, 0, 0.22))
          drop-shadow(0 0 0 rgba(0, 0, 0, 0))
          drop-shadow(0 0 0.8rem rgba(255, 255, 255, 0.65));
      }

      .head {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 999px;
        transform: rotate(var(--tilt));
      }

      .petal {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 34%;
        height: 52%;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.6), transparent 55%),
          linear-gradient(180deg, var(--yellow1), var(--yellow2) 55%, var(--yellow3));
        transform:
          translate(-50%, -105%)
          rotate(calc(var(--i) * 1deg))
          translateY(12%);
        transform-origin: 50% 110%;
        box-shadow:
          0 12px 22px rgba(148, 83, 0, 0.11),
          0 1px 0 rgba(255, 255, 255, 0.25) inset;
      }

      .center {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 40%;
        height: 40%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.25), transparent 55%),
          radial-gradient(circle at 45% 45%, var(--center1), var(--center2));
        box-shadow:
          0 10px 30px rgba(45, 20, 0, 0.28),
          0 1px 0 rgba(255, 255, 255, 0.2) inset;
      }

      .center::after {
        content: "";
        position: absolute;
        inset: 10%;
        border-radius: 999px;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 225, 150, 0.22), transparent 60%),
          repeating-radial-gradient(circle at 50% 50%, rgba(20, 9, 0, 0.2) 0 3px, transparent 3px 6px);
        opacity: 0.75;
        mix-blend-mode: overlay;
      }

      .spark {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 120%;
        height: 120%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 230, 120, 0.35), transparent 60%);
        filter: blur(10px);
        opacity: 0.55;
        animation: glow 2.2s ease-in-out infinite;
        pointer-events: none;
      }

      /* Reveal animation */
      body.is-revealing .flowerWrap {
        animation: vanish 1050ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      body.is-revealing .flower {
        animation: popAway 1050ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      body.is-revealing .petal {
        animation: petalOpen 880ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      body.is-revealing #garden {
        pointer-events: none;
      }

      /* Letter */
      .letterShell {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: clamp(1rem, 3vw, 2.2rem);
        z-index: 30;
        pointer-events: none;
      }

      .letter {
        width: min(720px, 92vw);
        border-radius: 26px;
        background:
          radial-gradient(900px 600px at 25% 20%, rgba(255, 235, 170, 0.35), transparent 55%),
          radial-gradient(700px 600px at 85% 40%, rgba(255, 190, 220, 0.28), transparent 55%),
          var(--card);
        border: 1px solid var(--cardStroke);
        box-shadow:
          0 35px 90px var(--shadow),
          0 0 0 1px rgba(255, 220, 120, 0.16) inset,
          0 1px 0 rgba(255, 255, 255, 0.35) inset;
        padding: clamp(1.2rem, 4vw, 2.1rem);
        transform: translateY(18px) scale(0.985);
        opacity: 0;
        transition:
          opacity 750ms ease,
          transform 750ms cubic-bezier(0.2, 0.8, 0.2, 1);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      body.is-revealing .letterShell {
        pointer-events: auto;
      }
      body.is-revealing .letter {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .letter h1 {
        margin: 0 0 0.7rem 0;
        font-size: clamp(1.25rem, 4.6vw, 1.65rem);
        letter-spacing: 0.2px;
      }

      .letter p {
        margin: 0;
        font-size: clamp(1.02rem, 4.1vw, 1.15rem);
        line-height: 1.65;
        white-space: pre-line;
      }

      .preface {
        margin: 0 0 0.75rem 0;
        font-weight: 700;
        letter-spacing: 0.15px;
        color: rgba(90, 45, 10, 0.88);
        text-shadow: 0 10px 35px rgba(255, 255, 255, 0.55);
      }

      .preface em {
        font-style: normal;
        background: linear-gradient(90deg, rgba(255, 215, 110, 0.35), rgba(255, 255, 255, 0));
        padding: 0.18rem 0.45rem;
        border-radius: 999px;
      }

      .signature {
        margin-top: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .tag {
        font-weight: 650;
        opacity: 0.8;
      }

      .typeCursor {
        display: inline-block;
        width: 0.6ch;
        height: 1.1em;
        margin-left: 0.15ch;
        transform: translateY(0.15em);
        background: rgba(59, 42, 42, 0.65);
        border-radius: 999px;
        animation: blink 900ms steps(1, end) infinite;
      }

      /* Keyframes */
      @keyframes appear {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes floaty {
        0% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX) * 0.12px), calc(var(--driftY) * 0.14px), 0);
        }
        25% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX) * 0.42px), calc(var(--driftY) * 0.32px), 0);
        }
        50% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX) * 0.78px), calc(var(--driftY) * 0.58px), 0);
        }
        75% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX) * 0.42px), calc(var(--driftY) * 0.32px), 0);
        }
        100% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX) * 0.12px), calc(var(--driftY) * 0.14px), 0);
        }
      }

      @keyframes sway {
        0% {
          transform: rotate(-1.05deg) scale(1);
        }
        25% {
          transform: rotate(-0.2deg) scale(1.005);
        }
        50% {
          transform: rotate(1.1deg) scale(1.012);
        }
        75% {
          transform: rotate(0.2deg) scale(1.005);
        }
        100% {
          transform: rotate(-1.05deg) scale(1);
        }
      }

      @keyframes glow {
        0%,
        100% {
          opacity: 0.4;
          transform: translate(-50%, -50%) scale(0.98);
        }
        50% {
          opacity: 0.7;
          transform: translate(-50%, -50%) scale(1.04);
        }
      }

      @keyframes bgFloat {
        0% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX, 0) * 0.1px), calc(var(--driftY, 0) * 0.12px), 0);
        }
        50% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX, 0) * 0.6px), calc(var(--driftY, 0) * 0.5px), 0);
        }
        100% {
          transform: translate3d(-50%, -50%, 0)
            translate3d(calc(var(--driftX, 0) * 0.1px), calc(var(--driftY, 0) * 0.12px), 0);
        }
      }

      @keyframes transitionPetals {
        0% {
          transform: translateY(40px) scale(1);
        }
        50% {
          transform: translateY(-20px) scale(1.05);
        }
        100% {
          transform: translateY(-80px) scale(1.08);
        }
      }

      @keyframes reactionPulse {
        0% {
          opacity: 0.85;
          transform: translate(-50%, -50%) scale(0.35);
        }
        60% {
          opacity: 0.45;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.3);
        }
      }

      @keyframes chipShine {
        0%,
        58% {
          transform: translateX(-65%) rotate(8deg);
          opacity: 0.18;
        }
        70% {
          opacity: 0.58;
        }
        100% {
          transform: translateX(65%) rotate(8deg);
          opacity: 0.18;
        }
      }

      @keyframes petalFall {
        0% {
          transform: translate3d(var(--driftX, 0), -5vh, 0) rotate(var(--startTilt, -12deg));
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        50% {
          transform: translate3d(calc(var(--driftX, 0) + 6vw), 50vh, 0) rotate(6deg);
          opacity: 0.85;
        }
        100% {
          transform: translate3d(calc(var(--driftX, 0) - 3vw), 105vh, 0) rotate(-18deg);
          opacity: 0;
        }
      }

      @keyframes vanish {
        to {
          opacity: 0;
        }
      }

      @keyframes popAway {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        55% {
          transform: scale(1.06);
          opacity: 1;
        }
        100% {
          transform: scale(0.82);
          opacity: 0;
        }
      }

      @keyframes petalOpen {
        to {
          transform:
            translate(-50%, -110%)
            rotate(calc(var(--i) * 1deg))
            translateY(18%)
            scale(1.02);
          filter: brightness(1.03);
        }
      }

      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @media (max-width: 640px) {
        body {
          overflow-y: auto;
        }
        .scene {
          min-height: 100vh;
          padding-top: 5.5rem;
          padding-bottom: 8rem;
        }
        .controls {
          position: fixed;
          left: 0.75rem;
          right: 0.75rem;
          top: 0.75rem;
          justify-content: center;
          flex-wrap: wrap;
          gap: 0.45rem;
        }
        .controls .chip {
          flex: 1 1 150px;
          text-align: center;
          box-shadow:
            0 10px 24px rgba(0, 0, 0, 0.05),
            0 0 0.65rem rgba(255, 200, 60, 0.14),
            0 1px 0 rgba(255, 255, 255, 0.3) inset;
        }
        .flower {
          filter:
            drop-shadow(0 14px 26px rgba(130, 75, 0, 0.16))
            drop-shadow(0 0 10px rgba(255, 210, 64, 0.12));
        }
        .letter {
          box-shadow:
            0 25px 60px rgba(80, 45, 0, 0.12),
            0 0 0 1px rgba(255, 220, 120, 0.12) inset,
            0 1px 0 rgba(255, 255, 255, 0.28) inset;
        }
        .backgroundFlowerWrap {
          opacity: 0.32;
        }
      }

      @media (max-width: 520px) {
        .controls {
          left: 0.65rem;
          right: 0.65rem;
        }
        .hint {
          transform: translate(-50%, calc(-50% + 9.1rem));
          font-size: 0.92rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .flowerWrap,
        .flower,
        .spark,
        .typeCursor,
        .chip::after {
          animation: none !important;
        }
        body {
          scroll-behavior: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="Flores amarillas románticas">
      <div class="bokeh" aria-hidden="true"></div>

      <div class="controls">
        <button class="chip" id="musicToggle" type="button">Música: OFF</button>
        <button class="chip" id="resetBtn" type="button">Reiniciar</button>
        <button class="chip chip--timer" id="loveTimer" type="button" aria-live="polite" aria-label="Tiempo juntos">
          Juntos: —
        </button>
        <a class="chip" id="memoriesLink" href="recuerditos.html">Recuerditos</a>
      </div>

      <div id="backgroundGarden" aria-hidden="true"></div>
      <div id="garden" aria-hidden="false"></div>
      <div id="petalRain" aria-hidden="true"></div>

      <div class="letterShell" aria-live="polite" aria-atomic="true">
        <section class="letter" role="dialog" aria-label="Carta romántica">
          <h1>Para ti, mi amorcito 💛</h1>
          <p class="preface"><em>desde lo más profundo de mi corazoncitoo 💛</em></p>
          <p id="letterText"></p>
          <div class="signature">
            <span class="tag">Tus flores amarillas 🌻</span>
            <span class="tag">— con todo mi cora 💛✨</span>
          </div>
        </section>
      </div>

      <div class="hint" id="hint">Toca una flor amarilla 🌻</div>
    </main>

    <div id="pageTransition" aria-hidden="true"></div>

    <script>
      (() => {
        const backgroundGarden = document.querySelector("#backgroundGarden");
        const garden = document.querySelector("#garden");
        const petalRain = document.querySelector("#petalRain");
        const hint = document.querySelector("#hint");
        const letterTextEl = document.querySelector("#letterText");
        const resetBtn = document.querySelector("#resetBtn");
        const musicToggle = document.querySelector("#musicToggle");
        const loveTimer = document.querySelector("#loveTimer");
        const memoriesLink = document.querySelector("#memoriesLink");
        const pageTransition = document.querySelector("#pageTransition");

        const romanticText =
          "Holaa amorcitoo apesar de que no pude darte tus flores amarillas en persona debido a la convi y eso me puse a hacer esta pagina web en 1 hora por eso no te respondía muxo, dejame decirte lo mucho que te amo haciendote este gesto.. 🌻💗\n" +
          "Te amoo muxisisimo amorcitoo, gracias por permitirme amarte,darte besitos y darte la felicidad que siempre te has merecido 💗🌻\n" +
          "gracias por los días más hermosos y bonitos al ladito tuyoo, gracias por todo en general pero igual muxisisimas gracias por ser mi noviaa toda hermosaaa y todaa preciosaaa 🌻💗\n" +
          "Te amooo un montónnnnn mi amoorcitoooo 💗🌻";

        const whisperPhrases = [
          "te amo mi sol",
          "eres mi personita favorita",
          "mi niña hermosa",
          "gracias por quedarte conmigo",
          "eres mi hogar bonito",
          "siempre contigo amor",
          "mi corazón es tuyo",
          "te adoro bb",
        ];

        const loveStartDate = new Date(2026, 1, 19, 0, 0, 0);
        const loveTimerModes = ["days", "hours", "clock"];

        let revealed = false;
        let typingTimer = null;
        let petalInterval = null;
        let petalStopTimer = null;
        let lastWhisperTs = 0;
        let loveTimerMode = 0;
        let loveTimerInterval = null;
        let loveTimerInitialized = false;

        // --- Flowers ---
        const rand = (min, max) => Math.random() * (max - min) + min;
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

        function createFlower({ x, y, size, isMain = false }) {
          const wrap = document.createElement("div");
          wrap.className = `flowerWrap${isMain ? " is-main" : ""}`;
          wrap.style.setProperty("--x", String(x));
          wrap.style.setProperty("--y", String(y));
          wrap.style.setProperty("--floatDur", `${rand(18, 34).toFixed(2)}s`);
          wrap.style.setProperty("--swayDur", `${rand(4.6, 8.8).toFixed(2)}s`);
          wrap.style.setProperty("--delay", `${rand(-6, 0).toFixed(2)}s`);
          wrap.style.setProperty("--driftX", `${rand(-18, 18).toFixed(2)}`);
          wrap.style.setProperty("--driftY", `${rand(-14, 14).toFixed(2)}`);

          const button = document.createElement("button");
          button.type = "button";
          button.className = "flower";
          button.style.setProperty("--size", `${size}px`);
          button.style.setProperty("--tilt", `${rand(-20, 25).toFixed(2)}deg`);
          button.setAttribute("aria-label", isMain ? "Flor amarilla principal" : "Flor amarilla");

          const head = document.createElement("div");
          head.className = "head";
          const spark = document.createElement("div");
          spark.className = "spark";
          head.appendChild(spark);

          // 12 petals
          const petals = 12;
          for (let p = 0; p < petals; p++) {
            const petal = document.createElement("div");
            petal.className = "petal";
            petal.style.setProperty("--i", String(p * (360 / petals)));
            head.appendChild(petal);
          }

          const center = document.createElement("div");
          center.className = "center";
          head.appendChild(center);

          button.appendChild(head);
          wrap.appendChild(button);
          return wrap;
        }

        function createBackgroundFlower({ x, y, size }) {
          const wrap = document.createElement("div");
          wrap.className = "backgroundFlowerWrap";
          wrap.style.setProperty("--x", String(x));
          wrap.style.setProperty("--y", String(y));
          wrap.style.setProperty("--floatDur", `${rand(24, 42).toFixed(2)}s`);
          wrap.style.setProperty("--driftX", `${rand(-10, 10).toFixed(2)}`);
          wrap.style.setProperty("--driftY", `${rand(-8, 8).toFixed(2)}`);

          const bloom = document.createElement("div");
          bloom.className = "backgroundFlower";
          bloom.style.setProperty("--size", `${size}px`);
          bloom.style.setProperty("--tilt", `${rand(-30, 30).toFixed(2)}deg`);

          const head = document.createElement("div");
          head.className = "head";
          const spark = document.createElement("div");
          spark.className = "spark";
          head.appendChild(spark);

          const petals = 12;
          for (let p = 0; p < petals; p++) {
            const petal = document.createElement("div");
            petal.className = "petal";
            petal.style.setProperty("--i", String(p * (360 / petals)));
            head.appendChild(petal);
          }

          const center = document.createElement("div");
          center.className = "center";
          head.appendChild(center);

          bloom.appendChild(head);
          wrap.appendChild(bloom);
          return wrap;
        }

        function seedBackgroundFlowers() {
          if (!backgroundGarden) return;
          backgroundGarden.innerHTML = "";
          const isCompact = window.matchMedia("(max-width: 640px)").matches;
          const amount = isCompact ? 8 : window.matchMedia("(max-width: 520px)").matches ? 12 : 20;
          for (let i = 0; i < amount; i++) {
            const flower = createBackgroundFlower({
              x: rand(2, 98),
              y: rand(4, 96),
              size: rand(isCompact ? 38 : 50, isCompact ? 74 : 92),
            });
            backgroundGarden.appendChild(flower);
          }
        }

        function seedGarden() {
          seedBackgroundFlowers();
          garden.innerHTML = "";
          revealed = false;
          document.body.classList.remove("is-revealing");
          hint.textContent = "Toca una flor amarilla 🌻";
          hint.style.opacity = "";
          stopTyping();
          stopPetalRain();
          letterTextEl.textContent = "";

          const amount = window.matchMedia("(max-width: 520px)").matches ? 10 : 14;
          const placements = [];

          // One main flower near the center
          placements.push({ x: 50, y: 45, size: window.innerWidth < 520 ? 132 : 156, isMain: true });

          for (let i = 0; i < amount; i++) {
            placements.push({
              x: rand(6, 94),
              y: rand(8, 92),
              size: rand(64, 120),
              isMain: false,
            });
          }

          for (const p of placements) {
            const flowerEl = createFlower(p);
            flowerEl.addEventListener("click", () => reveal());
            const flowerBtn = flowerEl.querySelector(".flower");
            if (flowerBtn) {
              flowerBtn.addEventListener("click", () => triggerFlowerReaction(flowerBtn));
            }
            garden.appendChild(flowerEl);
          }
        }

        // --- Reveal + typing ---
        function reveal() {
          if (revealed) return;
          revealed = true;

          document.body.classList.add("is-revealing");
          hint.textContent = "";
          startTyping(romanticText);
          startPetalRain();
        }

        function stopTyping() {
          if (typingTimer) {
            clearTimeout(typingTimer);
            typingTimer = null;
          }
        }

        function startTyping(text) {
          stopTyping();
          letterTextEl.textContent = "";

          const cursor = document.createElement("span");
          cursor.className = "typeCursor";
          cursor.setAttribute("aria-hidden", "true");
          letterTextEl.appendChild(cursor);

          let idx = 0;
          const isMobile = window.matchMedia("(max-width: 520px)").matches;
          const baseDelay = isMobile ? 46 : 42;

          const tick = () => {
            if (idx >= text.length) {
              cursor.remove();
              return;
            }

            const ch = text[idx++];
            // Insert before cursor so it stays at the end.
            cursor.insertAdjacentText("beforebegin", ch);
            const isPunctuation = /[\n.!?,…]/.test(ch);
            const delay = isPunctuation ? baseDelay * 5.5 : baseDelay;
            typingTimer = setTimeout(tick, delay + rand(0, 9));
          };

          typingTimer = setTimeout(tick, 300);
        }

        // --- Petal rain ---
        function spawnPetal() {
          if (!petalRain) return;
          const petal = document.createElement("span");
          petal.className = "petalRain__petal";
          const size = rand(16, 28);
          petal.style.setProperty("--petalSize", `${size}px`);
          petal.style.setProperty("--petalDur", `${rand(8.5, 13.5).toFixed(2)}s`);
          petal.style.setProperty("--startTilt", `${rand(-18, 18).toFixed(2)}deg`);
          petal.style.setProperty("--driftX", `${rand(-4, 4).toFixed(2)}vw`);
          petal.style.left = `${rand(2, 98)}%`;
          petal.style.animationDelay = `${rand(0, 1.4).toFixed(2)}s`;
          petal.style.opacity = `${rand(0.55, 0.85).toFixed(2)}`;
          petalRain.appendChild(petal);
          petal.addEventListener("animationend", () => petal.remove());
        }

        function startPetalRain() {
          if (!petalRain) return;
          stopPetalRain();
          petalRain.classList.add("is-active");
          const isCompact = window.matchMedia("(max-width: 640px)").matches;
          const initialBurst = isCompact ? 8 : 14;
          for (let i = 0; i < initialBurst; i++) {
            setTimeout(spawnPetal, i * (isCompact ? 220 : 160));
          }
          const cadence = isCompact ? 620 : 420;
          petalInterval = setInterval(() => {
            spawnPetal();
          }, cadence);
          petalStopTimer = setTimeout(() => {
            stopPetalRain();
          }, isCompact ? 14000 : 20000);
        }

        function stopPetalRain() {
          if (!petalRain) return;
          if (petalInterval) {
            clearInterval(petalInterval);
            petalInterval = null;
          }
          if (petalStopTimer) {
            clearTimeout(petalStopTimer);
            petalStopTimer = null;
          }
          petalRain.classList.remove("is-active");
          petalRain.innerHTML = "";
        }

        // --- Flower reactions ---
        function triggerFlowerReaction(target) {
          if (!target) return;
          target.classList.add("is-reacting");
          const burst = document.createElement("span");
          burst.className = "flowerReaction";
          target.appendChild(burst);
          burst.addEventListener("animationend", () => burst.remove());
          setTimeout(() => target.classList.remove("is-reacting"), 900);
          speakWhisper();
        }

        function speakWhisper() {
          const synth = window.speechSynthesis;
          if (!synth || typeof SpeechSynthesisUtterance === "undefined") return;
          const now = Date.now();
          if (synth.speaking || now - lastWhisperTs < 1400) return;
          lastWhisperTs = now;
          const utterance = new SpeechSynthesisUtterance(pick(whisperPhrases));
          utterance.lang = "es-ES";
          utterance.rate = 0.88;
          utterance.pitch = 1.1;
          utterance.volume = 0.6;
          synth.speak(utterance);
        }

        // --- Love timer ---
        function initLoveTimer() {
          if (!loveTimer || loveTimerInitialized) return;
          loveTimerInitialized = true;
          loveTimer.addEventListener("click", () => {
            loveTimerMode = (loveTimerMode + 1) % loveTimerModes.length;
            updateLoveTimer();
          });
          updateLoveTimer();
          loveTimerInterval = setInterval(updateLoveTimer, 1000);
        }

        function updateLoveTimer() {
          if (!loveTimer) return;
          const now = new Date();
          let diff = now - loveStartDate;
          if (diff < 0) diff = 0;
          const totalSeconds = Math.floor(diff / 1000);
          const totalMinutes = Math.floor(totalSeconds / 60);
          const totalHours = Math.floor(totalMinutes / 60);
          const days = Math.floor(totalHours / 24);
          const hours = totalHours % 24;
          const minutes = totalMinutes % 60;
          const seconds = totalSeconds % 60;
          const pad = (n) => String(n).padStart(2, "0");
          const modeKey = loveTimerModes[loveTimerMode] ?? loveTimerModes[0];

          const displayMap = {
            days: `Juntos: ${days} días`,
            hours: `Horas de amor: ${totalHours.toLocaleString("es-ES")}`,
            clock: `${pad(days)}d ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`,
          };

          loveTimer.textContent = displayMap[modeKey];
        }

        // --- Music (simple romantic arpeggio via WebAudio) ---
        let audioCtx = null;
        let musicOn = false;
        let musicInterval = null;

        const midiToFreq = (m) => 440 * Math.pow(2, (m - 69) / 12);

        function playTone(time, freq, duration, volume) {
          if (!audioCtx) return;

          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const filter = audioCtx.createBiquadFilter();

          filter.type = "lowpass";
          filter.frequency.setValueAtTime(1200, time);

          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, time);

          gain.gain.setValueAtTime(0.0001, time);
          gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), time + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

          osc.connect(filter);
          filter.connect(gain);
          gain.connect(audioCtx.destination);

          osc.start(time);
          osc.stop(time + duration + 0.05);
        }

        function startMusic() {
          if (musicOn) return;
          musicOn = true;

          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();

          const bpm = 84;
          const beat = 60 / bpm;

          // I - vi - IV - V in C (C, Am, F, G)
          const chords = [
            [60, 64, 67, 72],
            [57, 60, 64, 69],
            [53, 57, 60, 65],
            [55, 59, 62, 67],
          ];
          let chordIndex = 0;

          const scheduleBar = () => {
            if (!audioCtx) return;
            const now = audioCtx.currentTime + 0.04;
            const chord = chords[chordIndex % chords.length];

            // Soft bass + arpeggio
            playTone(now, midiToFreq(chord[0] - 12), beat * 2.2, 0.08);
            for (let i = 0; i < 8; i++) {
              const note = chord[i % chord.length] + pick([0, 12]);
              playTone(now + i * (beat / 2), midiToFreq(note), beat * 0.95, 0.045);
            }

            chordIndex++;
          };

          scheduleBar();
          musicInterval = setInterval(scheduleBar, beat * 4 * 1000);
          musicToggle.textContent = "Música: ON";
        }

        function stopMusic() {
          musicOn = false;
          if (musicInterval) {
            clearInterval(musicInterval);
            musicInterval = null;
          }
          musicToggle.textContent = "Música: OFF";
        }

        // --- Events ---
        resetBtn.addEventListener("click", () => seedGarden());
        musicToggle.addEventListener("click", () => {
          if (musicOn) stopMusic();
          else startMusic();
        });
        if (memoriesLink) {
          memoriesLink.addEventListener("click", (event) => {
            if (!pageTransition) return;
            event.preventDefault();
            const target = memoriesLink.getAttribute("href");
            document.body.classList.add("is-transitioning");
            pageTransition.setAttribute("aria-hidden", "false");
            setTimeout(() => {
              window.location.href = target ?? "recuerditos.html";
            }, 620);
          });
        }

        window.addEventListener("resize", () => {
          // Keep it simple: reseed positions on orientation changes.
          seedGarden();
        });

        // Start
        initLoveTimer();
        seedGarden();
      })();
    </script>
  </body>
</html>
